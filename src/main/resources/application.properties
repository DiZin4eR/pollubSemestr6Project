spring.application.name=EcoDataHub

spring.datasource.url=jdbc:mariadb://localhost:3306/economy_db
spring.datasource.username=eco_user
spring.datasource.password=eco_pass

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.pattern.level=%5p [requestId:%X{requestId:-}]

gus.request-delay=10s

news-api.api-key=${NEWS_API_KEY:2142cb7cc8ba4a829e73887f56de987d}
news-api.page-size=20
news-api.country=us
news-api.refresh-initial-delay-ms=30000
news-api.refresh-delay-ms=1800000

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.security.admin.username=${APP_ADMIN_USERNAME:admin}
app.security.admin.password=${APP_ADMIN_PASSWORD:admin}

app.jwt.secret=${APP_JWT_SECRET:change-this-development-secret-change-me}
app.jwt.expiration-seconds=86400
