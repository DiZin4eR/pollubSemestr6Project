
<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">EcoData Hub</a>
    <nav class="nav" aria-label="Main navigation">
        <a class="nav-link" th:href="@{/}">Home</a>
        <a class="nav-link active" th:href="@{/indicators}">Indicators</a>
        <a class="nav-link" th:href="@{/news}">News</a>
        <a class="nav-link" th:href="@{/swagger-ui.html}">Documentation</a>
        <a class="nav-link" th:href="@{/users}" sec:authorize="isAuthenticated()">User</a>
        <a class="nav-link" th:href="@{/login}" sec:authorize="isAnonymous()">Login</a>
    </nav>
</header>

<main class="page-shell">
    <section class="page-heading">
        <p class="eyebrow">Variables</p>
        <h1 th:text="${subject != null ? subject.name : subjectId}">Subject variables</h1>
        <div class="actions compact-actions">
            <a class="button secondary" th:href="@{/indicators}">Back to subjects</a>
        </div>
    </section>

    <section aria-label="GUS variables">
        <div class="alert success" th:if="${variableMessage}" th:text="${variableMessage}">Loaded variables.</div>
        <div class="alert error" th:if="${variableError}" th:text="${variableError}">Could not load variables.</div>
        <p th:if="${#lists.isEmpty(variables)}" class="empty">No variables found for this subject.</p>
        <div th:if="${!#lists.isEmpty(variables)}" class="table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Details</th>
                    <th>Unit</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="variable : ${variables}">
                    <td class="mono" th:text="${variable.id}">1</td>
                    <td th:text="${variable.name}">Variable name</td>
                    <td th:text="${variable.subname ?: '-'}">Details</td>
                    <td th:text="${variable.measureUnitName ?: '-'}">Unit</td>
                    <td class="table-action">
                        <a class="button secondary small"
                           th:href="@{/indicators/variables/{variableId}/data(
                                variableId=${variable.id},
                                subjectId=${subjectId},
                                subjectName=${subject != null ? subject.name : subjectId},
                                variableName=${variable.name},
                                variableSubname=${variable.subname}
                           )}">Open data</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
<div class="page-loader" data-page-loader hidden aria-hidden="true" role="status" aria-live="polite">
    <div class="loader-panel">
        <div class="loader-spinner" aria-hidden="true"></div>
        <div class="loader-text" data-loader-text>Processing request</div>
    </div>
</div>
<script th:src="@{/js/app-loading.js}" defer></script>
</body>
</html>
