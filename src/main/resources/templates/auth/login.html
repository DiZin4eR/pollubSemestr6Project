<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">EcoData Hub</a>
    <nav class="nav" aria-label="Main navigation">
        <a class="nav-link" th:href="@{/}">Home</a>
        <a class="nav-link" th:href="@{/signup}">Sign up</a>
    </nav>
</header>

<main class="page-shell auth-shell">
    <section class="auth-card">
        <p class="eyebrow">Account</p>
        <h1>Login</h1>
        <p th:if="${error}" class="form-error" th:text="${error}">Invalid credentials</p>
        <form class="auth-form" method="post" th:action="@{/login}">
            <label class="field">
                <span>Username</span>
                <input name="username" autocomplete="username" required th:value="${username}">
            </label>
            <label class="field">
                <span>Password</span>
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="button primary" type="submit">Login</button>
        </form>
    </section>
</main>
<div class="page-loader" data-page-loader hidden aria-hidden="true" role="status" aria-live="polite">
    <div class="loader-panel">
        <div class="loader-spinner" aria-hidden="true"></div>
        <div class="loader-text" data-loader-text>Processing request</div>
    </div>
</div>
<script th:src="@{/js/app-loading.js}" defer></script>
</body>
</html>
