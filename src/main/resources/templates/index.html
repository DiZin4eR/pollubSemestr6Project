<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoData Hub</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">EcoData Hub</a>
    <nav class="nav" aria-label="Main navigation">
        <a class="nav-link active" th:href="@{/}">Home</a>
        <a class="nav-link" th:href="@{/indicators}">Indicators</a>
        <a class="nav-link" th:href="@{/news}">News</a>
        <a class="nav-link" th:href="@{/swagger-ui.html}">Documentation</a>
        <a class="nav-avatar-link" th:href="@{/users}" sec:authorize="isAuthenticated()" aria-label="User profile"><img class="nav-avatar" th:src="@{/users/profile-photo}" alt=""></a>
        <a class="nav-link" th:href="@{/login}" sec:authorize="isAnonymous()">Login</a>
    </nav>
</header>

<main class="page-shell">
    <section class="intro">
        <p class="eyebrow">Economic data dashboard</p>
        <h1>GUS subjects and economic context in one place</h1>
        <p class="lead">
            Browse imported GUS indicator subjects from the database. News is prepared as a separate section for later work.
        </p>
        <div class="actions">
            <a class="button primary" th:href="@{/indicators}">Open indicators</a>
            <a class="button secondary" th:href="@{/news}">Open news</a>
        </div>
    </section>
</main>
<div class="page-loader" data-page-loader hidden aria-hidden="true" role="status" aria-live="polite">
    <div class="loader-panel">
        <div class="loader-spinner" aria-hidden="true"></div>
        <div class="loader-text" data-loader-text>Processing request</div>
    </div>
</div>
<script th:src="@{/js/app-loading.js}" defer></script>
</body>
</html>
